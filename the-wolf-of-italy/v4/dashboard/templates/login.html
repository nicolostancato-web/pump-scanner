<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf of Italy — Accesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🐺</div>
      <h1 class="text-2xl font-bold text-gray-900">Wolf of Italy</h1>
      <p class="text-sm text-gray-400 mt-1">Sistema di gestione investimenti</p>
    </div>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4">
      {{ error }}
    </div>
    {% endif %}
    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" name="password" autofocus
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900"
               placeholder="••••••••">
      </div>
      <button type="submit"
              class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-700 transition-colors">
        Accedi
      </button>
    </form>
  </div>
</body>
</html>
