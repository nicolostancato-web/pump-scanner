<!DOCTYPE html>
<html lang="it" x-data="{dark:localStorage.getItem('wolf-dark')==='true'}" :class="{dark:dark}" class="h-full">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login · Wolf of Italy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}*{font-family:'Inter',system-ui,sans-serif}</style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 flex items-center justify-center p-4" x-cloak>
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex w-14 h-14 rounded-2xl items-center justify-center text-3xl shadow-md mb-4"
           style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">🐺</div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Wolf of Italy</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Sistema di trading autonomo v4</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-7">
      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-50 dark:bg-red-950 border border-red-100 dark:border-red-900 rounded-xl flex items-center gap-2.5">
        <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <p class="text-sm text-red-600 dark:text-red-400 font-medium">{{ error }}</p>
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Password</label>
          <input type="password" name="password" autofocus placeholder="••••••••"
                 class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>
        <button type="submit"
                class="w-full py-3 rounded-xl text-sm font-semibold text-white transition"
                style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">
          Accedi al sistema
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      The Wolf of Italy · Sistema autonomo · Solo accesso autorizzato
    </p>
  </div>
</body>
</html>
